name: 每日 AI 日报

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install uv
          uv sync

      - name: 验证环境变量
        env:
          DEEPSEEK_API_KEY: "sk-53480528111e426790f58044c5c580c4"
        run: |
          echo "Key长度: ${#DEEPSEEK_API_KEY}"
          python -c "import os; k=os.getenv('DEEPSEEK_API_KEY'); print('Python读到Key长度:', len(k) if k else '未读到')"

      - name: 运行 Horizon 生成日报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASS: ${{ secrets.EMAIL_SMTP_PASS }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          uv run horizon --hours 24

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: 'data/site'
