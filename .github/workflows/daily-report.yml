name: daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install uv && uv sync

      - name: patch and run
        run: |
          KEY="${{ secrets.DEEPSEEK_API_KEY }}"
          find .venv -name "client.py" -path "*/ai/client.py" -exec \
            sed -i "s|api_key = os.getenv(config.api_key_env)|api_key = os.getenv(config.api_key_env) or '${KEY}'|g" {} \;
          uv run horizon --hours 24
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASS: ${{ secrets.EMAIL_SMTP_PASS }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}

      - name: 生成网页
        run: |
          TODAY=$(date +%Y-%m-%d)
          pip install markdown -q
          python - <<EOF
          import markdown, os, glob

          today = "${TODAY}"
          md_file = f"data/summaries/horizon-{today}-zh.md"
          if not os.path.exists(md_file):
              files = sorted(glob.glob("data/summaries/horizon-*-zh.md"))
              md_file = files[-1] if files else None

          content = open(md_file).read() if md_file else "暂无内容"
          html_content = markdown.markdown(content, extensions=["extra", "toc"])

          html = f"""<!DOCTYPE html>
          <html lang="zh">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>AI 日报 {today}</title>
          <style>
            body {{ font-family: -apple-system, sans-serif; max-width: 780px; margin: 0 auto; padding: 16px; line-height: 1.8; color: #222; }}
            h1 {{ font-size: 1.5em; border-bottom: 2px solid #eee; padding-bottom: 8px; }}
            h2 {{ font-size: 1.2em; margin-top: 2em; color: #1a1a2e; }}
            h3 {{ font-size: 1em; color: #333; }}
            a {{ color: #0066cc; }}
            code {{ background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }}
            blockquote {{ border-left: 4px solid #ddd; margin: 0; padding-left: 16px; color: #666; }}
            .date {{ color: #888; font-size: 0.9em; margin-bottom: 1.5em; }}
            @media (max-width: 600px) {{ body {{ padding: 12px; }} h1 {{ font-size: 1.3em; }} }}
          </style>
          </head>
          <body>
          <p class="date">📅 {today}</p>
          {html_content}
          </body>
          </html>"""

          os.makedirs("_site", exist_ok=True)
          with open("_site/index.html", "w") as f:
              f.write(html)
          print("网页生成成功：_site/index.html")
          EOF

      - name: 发送企业微信通知
        continue-on-error: true
        run: |
          TODAY=$(date +%Y-%m-%d)
          SITE_URL="https://maxwin7373-wq.github.io/ai-daily-report"
          curl -s -X POST "${{ secrets.WECOM_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"📰 今日 AI 日报已出炉！\n\n📅 ${TODAY}\n\n🔗 完整版：${SITE_URL}\"}}"

      - name: 发送邮件通知
        continue-on-error: true
        run: |
          TODAY=$(date +%Y-%m-%d)
          SITE_URL="https://maxwin7373-wq.github.io/ai-daily-report"
          python - <<EOF
          import smtplib, glob, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.header import Header

          host = "${{ secrets.EMAIL_SMTP_HOST }}"
          port = int("${{ secrets.EMAIL_SMTP_PORT }}")
          user = "${{ secrets.EMAIL_SMTP_USER }}"
          password = "${{ secrets.EMAIL_SMTP_PASS }}"
          today = "${TODAY}"
          site_url = "${SITE_URL}"

          md_file = f"data/summaries/horizon-{today}-zh.md"
          if not os.path.exists(md_file):
              files = sorted(glob.glob("data/summaries/horizon-*-zh.md"))
              md_file = files[-1] if files else None
          content = open(md_file).read() if md_file else "今日日报已生成"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = Header(f"【AI日报】{today} 今日精选", "utf-8").encode()
          msg["From"] = user
          msg["To"] = user
          body = f"{content}\n\n---\n🔗 网页版：{site_url}"
          msg.attach(MIMEText(body, "plain", "utf-8"))

          with smtplib.SMTP(host, port) as smtp:
              smtp.starttls()
              smtp.login(user, password)
              smtp.sendmail(user, user, msg.as_string())
              print("邮件发送成功！")
          EOF

      - name: 上传网页文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
