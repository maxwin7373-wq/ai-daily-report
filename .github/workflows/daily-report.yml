name: 每日 AI 日报

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install uv
          uv sync

      - name: 修补 AI 客户端
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python - <<'EOF'
          import os, re

          key = os.getenv("DEEPSEEK_API_KEY", "")
          print(f"Key长度: {len(key)}, 前4位: {key[:4]}")

          # 找到安装进venv的client.py
          import glob
          paths = glob.glob(".venv/**/client.py", recursive=True)
          print(f"找到文件: {paths}")

          for path in paths:
              if "ai/client.py" not in path:
                  continue
              with open(path, "r") as f:
                  content = f.read()
              # 替换OpenAIClient的__init__中读取api_key的那行
              old = 'api_key = os.getenv(config.api_key_env)'
              new = f'api_key = os.getenv(config.api_key_env) or "{key}"'
              if old in content:
                  content = content.replace(old, new, 1)
                  with open(path, "w") as f:
                      f.write(content)
                  print(f"修补成功: {path}")
              else:
                  print(f"未找到目标代码，跳过: {path}")
          EOF

      - name: 运行 Horizon 生成日报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASS: ${{ secrets.EMAIL_SMTP_PASS }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          uv run horizon --hours 24

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: 'data/site'
